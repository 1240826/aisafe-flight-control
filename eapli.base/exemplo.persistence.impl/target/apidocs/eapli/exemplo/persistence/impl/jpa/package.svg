@startuml
    namespace eapli.exemplo.persistence.impl.jpa {

        class BaseJpaRepositoryBase<T, K, I> [[BaseJpaRepositoryBase.html]] {
            ~BaseJpaRepositoryBase(String, String)
            ~BaseJpaRepositoryBase(String)
        }

        class ExemploJpaReportingRepositoryBase [[ExemploJpaReportingRepositoryBase.html]] {
            ~ExemploJpaReportingRepositoryBase()
            ~ExemploJpaReportingRepositoryBase(String)
        }

        class JpaClientUserRepository [[JpaClientUserRepository.html]] {
            +JpaClientUserRepository(TransactionalContext)
            +JpaClientUserRepository(String)
            +findByUsername(Username): Optional<Utente>
            +findByMecanographicNumber(MecanographicNumber): Optional<Utente>
            +findAllActive(): Iterable<Utente>
        }

        class JpaRepositoryFactory [[JpaRepositoryFactory.html]] {
            +users(TransactionalContext): UserRepository
            +users(): UserRepository
            +utentes(TransactionalContext): JpaClientUserRepository
            +utentes(): JpaClientUserRepository
            +signupRequests(TransactionalContext): SignupRequestRepository
            +signupRequests(): SignupRequestRepository
            +newTransactionalContext(): TransactionalContext
        }

        class JpaSignupRequestRepository [[JpaSignupRequestRepository.html]] {
            +JpaSignupRequestRepository(TransactionalContext)
            +JpaSignupRequestRepository(String)
            +pendingSignupRequests(): Iterable<SignupRequest>
        }

        class PersistenceSettings [[PersistenceSettings.html]] {
            {static} +PERSISTENCE_UNIT_NAME: String
        }

        eapli.framework.infrastructure.repositories.impl.jpa.JpaTransactionalRepository <|- - BaseJpaRepositoryBase
        eapli.framework.infrastructure.repositories.impl.jpa.JpaTransactionalContext <|- - ExemploJpaReportingRepositoryBase
        eapli.framework.infrastructure.repositories.impl.jpa.JpaAutoTxRepository <|- - JpaClientUserRepository
        eapli.exemplo.utentemanagement.repositories.UtenteRepository <|.. JpaClientUserRepository
        eapli.exemplo.infrastructure.persistence.RepositoryFactory <|.. JpaRepositoryFactory
        eapli.framework.infrastructure.repositories.impl.jpa.JpaAutoTxRepository <|- - JpaSignupRequestRepository
        eapli.exemplo.utentemanagement.repositories.SignupRequestRepository <|.. JpaSignupRequestRepository
    }

    namespace eapli.framework.infrastructure.repositories.impl.jpa {
        class JpaTransactionalRepository<T, K, I>
        class JpaTransactionalContext {
            {static} -LOGGER: Logger
            -persistenceUnitName: String
            {static} -singletonEMF: EntityManagerFactory
            -entityManager: EntityManager
            -properties: Map
        }
        class JpaAutoTxRepository<T, K, I> {
            #repo: JpaBaseRepository<T, K, I>
            -autoTx: TransactionalContext
        }
    }

    namespace eapli.exemplo.utentemanagement.repositories {
        interface UtenteRepository {
            {abstract} +findByUsername(Username): Optional<Utente>
            +findByMecanographicNumber(MecanographicNumber): Optional<Utente>
            {abstract} +findAllActive(): Iterable<Utente>
        }
        interface SignupRequestRepository {
            {abstract} +pendingSignupRequests(): Iterable<SignupRequest>
        }
    }

    namespace eapli.exemplo.infrastructure.persistence {
        interface RepositoryFactory {
            {abstract} +newTransactionalContext(): TransactionalContext
            {abstract} +users(TransactionalContext): UserRepository
            {abstract} +users(): UserRepository
            {abstract} +utentes(TransactionalContext): UtenteRepository
            {abstract} +utentes(): UtenteRepository
            {abstract} +signupRequests(TransactionalContext): SignupRequestRepository
            {abstract} +signupRequests(): SignupRequestRepository
        }
    }

    center footer UMLDoclet 2.0.12, PlantUML 1.2020.16
@enduml

