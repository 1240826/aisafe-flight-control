@startuml
    namespace eapli.exemplo.utentemanagement.application.eventhandlers {

        class AddUtenteOnSignupAcceptedController [[AddUtenteOnSignupAcceptedController.html]] {
            -repo: UserRepository
            -clientUserRepository: UtenteRepository
            +addExemploUtente(NewUserRegisteredFromSignupEvent): Utente
            -findUser(NewUserRegisteredFromSignupEvent): Optional<SystemUser>
        }

        class NewUserRegisteredFromSignupWatchDog [[NewUserRegisteredFromSignupWatchDog.html]] {
            +onEvent(DomainEvent): void
        }

        eapli.framework.infrastructure.pubsub.EventHandler <|.. NewUserRegisteredFromSignupWatchDog
    }

    namespace eapli.framework.infrastructure.pubsub {
        interface EventHandler {
            {abstract} +onEvent(DomainEvent): void
        }
    }

    center footer UMLDoclet 2.0.12, PlantUML 1.2020.16
@enduml

