@startuml
    namespace eapli.exemplo.utentemanagement.repositories {

        interface UtenteRepository [[UtenteRepository.html]] {
            {abstract} +findByUsername(Username): Optional<Utente>
            +findByMecanographicNumber(MecanographicNumber): Optional<Utente>
            {abstract} +findAllActive(): Iterable<Utente>
        }

        interface SignupRequestRepository [[SignupRequestRepository.html]] {
            {abstract} +pendingSignupRequests(): Iterable<SignupRequest>
        }

        eapli.framework.domain.repositories.DomainRepository <|- - UtenteRepository
        eapli.framework.domain.repositories.DomainRepository <|- - SignupRequestRepository
    }

    namespace eapli.framework.domain.repositories {
        interface DomainRepository<I extends Comparable<​I>, T extends AggregateRoot<I extends Comparable<​I>>> {
            {abstract} +save(S extends AggregateRoot<I extends Comparable<​I>>): S extends AggregateRoot<I extends Comparable<​I>>
