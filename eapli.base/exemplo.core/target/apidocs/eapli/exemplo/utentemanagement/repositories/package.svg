            {abstract} +delete(T extends AggregateRoot<I extends Comparable<​I>>): void
            {abstract} +deleteOfIdentity(I extends Comparable<I extends Comparable<I>>): void
            {abstract} +count(): long
            +size(): long
            +remove(T extends AggregateRoot<I extends Comparable<​I>>): void
            +removeOfIdentity(I extends Comparable<I extends Comparable<I>>): void
        }
    }

