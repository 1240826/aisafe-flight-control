@startuml
    namespace eapli.exemplo.utentemanagement.domain.events {

        class NewUserRegisteredFromSignupEvent [[NewUserRegisteredFromSignupEvent.html]] {
            {static} -serialVersionUID: long
            -mecanographicNumber: MecanographicNumber
            -newUser: Username
            +NewUserRegisteredFromSignupEvent(MecanographicNumber, Username)
            +mecanographicNumber(): MecanographicNumber
            +username(): Username
        }

        class SignupAcceptedEvent [[SignupAcceptedEvent.html]] {
            {static} -serialVersionUID: long
            -theSignupRequest: SignupRequest
            +SignupAcceptedEvent(SignupRequest)
            +username(): Username
            +password(): Password
            +name(): Name
            +email(): EmailAddress
            +mecanographicNumber(): MecanographicNumber
        }

        eapli.framework.domain.events.DomainEventBase <|- - NewUserRegisteredFromSignupEvent
        eapli.framework.domain.events.DomainEvent <|.. NewUserRegisteredFromSignupEvent
        eapli.framework.domain.events.DomainEventBase <|- - SignupAcceptedEvent
    }

    namespace eapli.framework.domain.events {
        abstract class DomainEventBase {
            {static} -serialVersionUID: long
            -occuredAt: Calendar
            -registeredAt: Calendar
        }
        interface DomainEvent {
            {abstract} +occurredAt(): Calendar
            {abstract} +registeredAt(): Calendar
        }
    }

    center footer UMLDoclet 2.0.12, PlantUML 1.2020.16
@enduml

