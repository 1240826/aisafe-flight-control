@startuml
    namespace eapli.exemplo.myutente.application {

        class MyUtenteService [[MyUtenteService.html]] {
            -authz: AuthorizationService
            -repo: UtenteRepository
            +me(): Utente
            +myUser(): Utente
        }

        class SignupController [[SignupController.html]] {
            -signupRequestRepository: SignupRequestRepository
            +signup(String, String, String, String, String, String, Calendar): SignupRequest
            +signup(String, String, String, String, String, String): SignupRequest
        }

    }

    center footer UMLDoclet 2.0.12, PlantUML 1.2020.16
@enduml

