@startuml
    namespace eapli.exemplo.usermanagement.application.eventhandlers {

        class SignupAcceptedWatchDog [[SignupAcceptedWatchDog.html]] {
            {static} -LOGGER: Logger
            +onEvent(DomainEvent): void
        }

        class AddUserOnSignupAcceptedController [[AddUserOnSignupAcceptedController.html]] {
            -userRepository: UserRepository
            -dispatcher: EventPublisher
            +addUser(SignupAcceptedEvent): SystemUser
        }

        eapli.framework.infrastructure.pubsub.EventHandler <|.. SignupAcceptedWatchDog
    }

    namespace eapli.framework.infrastructure.pubsub {
        interface EventHandler {
            {abstract} +onEvent(DomainEvent): void
        }
    }

    center footer UMLDoclet 2.0.12, PlantUML 1.2020.16
@enduml

