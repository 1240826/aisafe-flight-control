link eapli.exemplo.usermanagement.application.DeactivateUserController to eapli.exemplo.usermanagement.application.ListUsersController--><text fill="#888888" font-family="sans-serif" font-size="10" lengthAdjust="spacingAndGlyphs" textLength="188" x="296.5" y="345.268">UMLDoclet 2.0.12, PlantUML 1.2020.16</text><!--MD5=[3005f70d2392f9529f65dc8a82c0fcae]
@startuml
    namespace eapli.exemplo.usermanagement.application {

        class DeactivateUserController [[DeactivateUserController.html]] {
            -authz: AuthorizationService
            -userSvc: UserManagementService
            +activeUsers(): Iterable<SystemUser>
            +deactivateUser(SystemUser): SystemUser
        }

        class AddUserController [[AddUserController.html]] {
            -authz: AuthorizationService
            -userSvc: UserManagementService
            +getRoleTypes(): Role[]
            +addUser(String, String, String, String, String, Set<Role>, Calendar): SystemUser
            +addUser(String, String, String, String, String, Set<Role>): SystemUser
        }

        class ListUsersController [[ListUsersController.html]] {
            -authz: AuthorizationService
            -userSvc: UserManagementService
            +allUsers(): Iterable<SystemUser>
            +find(Username): Optional<SystemUser>
        }

    }

    center footer UMLDoclet 2.0.12, PlantUML 1.2020.16
@enduml

